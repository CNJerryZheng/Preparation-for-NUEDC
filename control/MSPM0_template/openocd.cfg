# ============================================================
# openocd.cfg — MSPM0G3507 + DAP-LINK (CMSIS-DAP v2)
# 基于亚博 MSPM0G3507 教程 + TI OpenOCD 分支
# 使用 DSSM 邮箱 + PWR_AP 低功耗恢复机制
# ============================================================

# --- CMSIS-DAP 调试器 ---
source [find interface/cmsis-dap.cfg]

# 初始 SWD 速率：低速有助于低功耗恢复
adapter speed 100

# --- 跳过 IDCODE 校验（低功耗锁定时返回 WAIT）---
set DAP_SWD_ID 0

# --- SRST 复位线（nRST 必须连接 DAP-LINK 才能用）---
# 如果 nRST 未连接，下面这行无效，需用「断电大法」
reset_config srst_only

# --- MSPM0 目标配置（含低功耗恢复、DSSM 邮箱）---
source [find target/ti_mspm0.cfg]

# --- 连接后提速 ---
$_TARGETNAME configure -event examine-end {
    adapter speed 1000
}

# --- 复位后 halt ---
$_TARGETNAME configure -event reset-init {
    adapter speed 1000
    halt
}

echo "========================================"
echo "  MSPM0G3507 + DAP-LINK (CMSIS-DAP v2)"
echo "  速率: 100 kHz → 连接后 1 MHz"
echo "  低功耗恢复: PWR_AP + DSSM 邮箱"
echo "  nRST: SRST 模式（需连接 nRST）"
echo "========================================"

echo "========================================"
